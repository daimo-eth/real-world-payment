[profile.default]
src = 'src'
out = 'out'
libs = ['lib']

solc = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 999_999
evm_version = "london"

remappings = [
    "forge-std/=lib/forge-std/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "solmate/=lib/solmate/",
]

# Exclude OZ build artifacts from being compiled as test/script
[profile.default.fmt]
line_length = 100
